# Followed this example: https://github.com/letsgetrusty/api-deployment-example/blob/master/.github/workflows/prod.yml
name: Build, Test and Deploy to Prod

on:
  # workflow_dispatch enables a manual workflow trigger button
  workflow_dispatch:
  push:
    branches:
      - main

env:
  SQLX_OFFLINE: true
  DOCKER_REPOSITORY: reifenrathdev/url-shortener
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --verbose

    - name: Test
      run: cargo test --verbose

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker images
      uses: docker/bake-action@v6
      with:
        push: true
        set: |
          *.tags=${{ env.DOCKER_REPOSITORY }}:latest
